<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agentic Defence — Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;padding:2rem}
h1{font-size:1.4rem;color:#fff;margin-bottom:.2rem}
.sub{color:#64748b;font-size:.8rem;margin-bottom:1.5rem}
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:.4rem 1rem;border-radius:6px;cursor:pointer;background:#1e2130;color:#94a3b8;border:none;font-size:.85rem}
.tab.active{background:#3b4fd8;color:#fff}
.panel{display:none}.panel.active{display:block}
.cards{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.card{background:#1e2130;border-radius:8px;padding:1rem 1.4rem;min-width:130px}
.card-label{font-size:.72rem;color:#64748b;margin-bottom:.2rem}
.card-val{font-size:1.6rem;font-weight:600;color:#fff}
table{width:100%;border-collapse:collapse;background:#1e2130;border-radius:8px;overflow:hidden;font-size:.82rem}
th{text-align:left;padding:.65rem 1rem;font-size:.72rem;color:#64748b;border-bottom:1px solid #2d3148}
td{padding:.55rem 1rem;border-bottom:1px solid #1a1d2e}
.badge{padding:2px 7px;border-radius:4px;font-size:.72rem;font-weight:500}
.block{background:#3d1515;color:#f87171}
.alert{background:#3d2e10;color:#fbbf24}
.safe{background:#0f2d1a;color:#4ade80}
.btn{padding:.35rem .9rem;border-radius:6px;border:none;cursor:pointer;font-size:.8rem;font-weight:500}
.btn-red{background:#7f1d1d;color:#fca5a5}.btn-red:hover{background:#991b1b}
.btn-green{background:#14532d;color:#86efac}.btn-green:hover{background:#166534}
.btn-blue{background:#1e3a5f;color:#93c5fd}.btn-blue:hover{background:#1e40af}
.btn-sim{background:#312e81;color:#c7d2fe;padding:.5rem 1.4rem;font-size:.9rem;border-radius:8px;border:none;cursor:pointer}
.btn-sim:hover{background:#3730a3}
.sim-result{margin-top:1rem;background:#1e2130;border-radius:8px;padding:1rem;font-size:.82rem;white-space:pre-wrap;color:#94a3b8;min-height:60px}
.config-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.config-row label{width:120px;font-size:.82rem;color:#94a3b8}
.config-row input{width:80px;background:#1a1d2e;border:1px solid #2d3148;color:#e2e8f0;border-radius:6px;padding:.3rem .5rem;font-size:.85rem}
.save-btn{margin-top:.5rem}
.wh-entry{padding:.5rem .75rem;border-bottom:1px solid #1a1d2e;font-size:.8rem}
.wh-entry .wh-time{color:#64748b;margin-right:.5rem}
.wh-ok{color:#4ade80}.wh-err{color:#f87171}.wh-skip{color:#fbbf24}
</style>
</head>
<body>
<h1>Agentic Defence System</h1>
<p class="sub" id="refresh-note">Auto-refreshes every 10s</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('logs')">Threat Logs</button>
  <button class="tab" onclick="switchTab('blacklist')">Blacklist</button>
  <button class="tab" onclick="switchTab('simulate')">Simulate</button>
  <button class="tab" onclick="switchTab('config')">Thresholds</button>
  <button class="tab" onclick="switchTab('webhook')">Webhook Log</button>
</div>

<!-- LOGS -->
<div id="tab-logs" class="panel active">
  <div class="cards" id="stat-cards"></div>
  <table>
    <thead><tr><th>IP</th><th>Threat</th><th>Action</th><th>Risk</th><th>Reason</th></tr></thead>
    <tbody id="log-body"></tbody>
  </table>
</div>

<!-- BLACKLIST -->
<div id="tab-blacklist" class="panel">
  <div style="display:flex;gap:.5rem;margin-bottom:1rem">
    <input id="bl-ip" placeholder="IP to block" style="background:#1a1d2e;border:1px solid #2d3148;color:#e2e8f0;border-radius:6px;padding:.35rem .7rem;font-size:.85rem;width:200px">
    <button class="btn btn-red" onclick="blockIP()">Block IP</button>
  </div>
  <table>
    <thead><tr><th>IP</th><th>Action</th></tr></thead>
    <tbody id="bl-body"></tbody>
  </table>
</div>

<!-- SIMULATE -->
<div id="tab-simulate" class="panel">
  <p style="color:#94a3b8;font-size:.85rem;margin-bottom:1rem">Fire a random event through the full detection pipeline.</p>
  <button class="btn-sim" onclick="simulate()">&#9654; Simulate Event</button>
  <div class="sim-result" id="sim-out">Result will appear here...</div>
</div>

<!-- THRESHOLDS CONFIG -->
<div id="tab-config" class="panel">
  <p style="color:#94a3b8;font-size:.85rem;margin-bottom:1rem">Changes apply immediately without restart.</p>
  <div class="config-row">
    <label>Block threshold</label>
    <input type="number" id="cfg-block" min="1" max="100">
    <span style="font-size:.75rem;color:#64748b">risk score ≥ this → block</span>
  </div>
  <div class="config-row">
    <label>Alert threshold</label>
    <input type="number" id="cfg-alert" min="1" max="100">
    <span style="font-size:.75rem;color:#64748b">risk score ≥ this → alert</span>
  </div>
  <div class="config-row">
    <label>Flood limit</label>
    <input type="number" id="cfg-flood" min="10" max="1000">
    <span style="font-size:.75rem;color:#64748b">requests/60s per IP</span>
  </div>
  <button class="btn btn-blue save-btn" onclick="saveThresholds()">Save</button>
  <p id="cfg-msg" style="margin-top:.5rem;font-size:.8rem;color:#4ade80"></p>
</div>

<!-- WEBHOOK LOG -->
<div id="tab-webhook" class="panel">
  <div id="wh-body"></div>
</div>

<script>
const BASE = '';
const KEY = localStorage.getItem('api_key') || '';
const H = () => ({'Content-Type':'application/json','X-API-Key': KEY});

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', ['logs','blacklist','simulate','config','webhook'][i]===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='config') loadThresholds();
  if(name==='webhook') loadWebhookLog();
  if(name==='blacklist') loadBlacklist();
  if(name==='logs') loadLogs();
}

async function loadLogs() {
  const r = await fetch(BASE+'/logs', {headers:H()}).catch(()=>null);
  if(!r||!r.ok) return;
  const {logs} = await r.json();
  const bl = document.getElementById('log-body');
  bl.innerHTML = logs.map(r=>`<tr>
    <td>${r.ip||''}</td><td>${r.threat||''}</td>
    <td><span class="badge ${r.action}">${r.action||''}</span></td>
    <td>${r.risk_score||''}</td><td>${(r.reason||'').slice(0,60)}</td>
  </tr>`).join('');
  const total=logs.length, blocked=logs.filter(l=>l.action==='block').length, alerted=logs.filter(l=>l.action==='alert').length;
  document.getElementById('stat-cards').innerHTML=`
    <div class="card"><div class="card-label">Total Events</div><div class="card-val">${total}</div></div>
    <div class="card"><div class="card-label">Blocked</div><div class="card-val" style="color:#f87171">${blocked}</div></div>
    <div class="card"><div class="card-label">Alerts</div><div class="card-val" style="color:#fbbf24">${alerted}</div></div>`;
}

async function loadBlacklist() {
  const r = await fetch(BASE+'/blacklist', {headers:H()}).catch(()=>null);
  if(!r||!r.ok) return;
  const {blacklist} = await r.json();
  document.getElementById('bl-body').innerHTML = blacklist.map(b=>`<tr>
    <td>${b.ip}</td>
    <td><button class="btn btn-green" onclick="unblockIP('${b.ip}')">Unblock</button></td>
  </tr>`).join('');
}

async function blockIP() {
  const ip = document.getElementById('bl-ip').value.trim();
  if(!ip) return;
  await fetch(BASE+'/blacklist', {method:'POST',headers:H(),body:JSON.stringify({ip})});
  document.getElementById('bl-ip').value='';
  loadBlacklist();
}

async function unblockIP(ip) {
  await fetch(BASE+'/blacklist/'+ip, {method:'DELETE',headers:H()});
  loadBlacklist();
}

async function simulate() {
  document.getElementById('sim-out').textContent = 'Running...';
  const r = await fetch(BASE+'/simulate', {method:'POST',headers:H()}).catch(()=>null);
  if(!r||!r.ok){document.getElementById('sim-out').textContent='Error: check API key or server.';return;}
  const data = await r.json();
  document.getElementById('sim-out').textContent = JSON.stringify(data, null, 2);
}

async function loadThresholds() {
  const r = await fetch(BASE+'/config/thresholds', {headers:H()}).catch(()=>null);
  if(!r||!r.ok) return;
  const t = await r.json();
  document.getElementById('cfg-block').value = t.block;
  document.getElementById('cfg-alert').value = t.alert;
  document.getElementById('cfg-flood').value = t.flood;
}

async function saveThresholds() {
  const body = {
    block: parseInt(document.getElementById('cfg-block').value),
    alert: parseInt(document.getElementById('cfg-alert').value),
    flood: parseInt(document.getElementById('cfg-flood').value)
  };
  const r = await fetch(BASE+'/config/thresholds', {method:'POST',headers:H(),body:JSON.stringify(body)});
  const msg = document.getElementById('cfg-msg');
  if(r.ok){msg.textContent='Saved!';setTimeout(()=>msg.textContent='',2000);}
  else{msg.style.color='#f87171';msg.textContent='Failed to save.';}
}

async function loadWebhookLog() {
  const r = await fetch(BASE+'/webhook/log', {headers:H()}).catch(()=>null);
  if(!r||!r.ok) return;
  const {log} = await r.json();
  document.getElementById('wh-body').innerHTML = log.length
    ? log.map(e=>{
        const cls = e.status==='sent'?'wh-ok':e.status.startsWith('error')?'wh-err':'wh-skip';
        return `<div class="wh-entry"><span class="wh-time">${e.time}</span><span class="${cls}">[${e.status}]</span> ${e.message}</div>`;
      }).join('')
    : '<p style="color:#64748b;padding:1rem">No webhook notifications yet.</p>';
}

// Initial load
loadLogs();
setInterval(()=>{ if(document.getElementById('tab-logs').classList.contains('active')) loadLogs(); }, 10000);
</script>
</body>
</html>
